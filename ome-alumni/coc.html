<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COC-Alumni@OME</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
 
  <!-- Google Fonts (Kanit) -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <style>
    body {
      font-family: 'Kanit', sans-serif;
    }

    /* Loading Overlay Styles */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 255, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    /* Card Styles */
    .card {
      max-width: 400px;
      border-radius: 30px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease-in-out;
      margin: 10px auto;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      height: 180px;
      width: 140px;
      margin: 40px auto 10px auto;
      display: block;
    }

    /* Responsive Card Layout */
    @media (min-width: 768px) {
      #cardsContainer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }
    }

    /* Back to Top Button */
    #backToTop {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      display: none;
      z-index: 1001;
    }

    /* Search Section Styles */
    #searchSection {
      transition: max-height 0.3s ease-in-out;
      overflow: hidden;
      max-height: 0;
    }

    #searchSection.show {
      max-height: 200px; /* Adjust to fit your content */
    }

    #toggleSearch {
      display: block;
      margin: 0 auto;
      width: 200px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="alert alert-primary" role="alert">
      กำลังโหลดข้อมูล กรุณารอสักครู่...
    </div>
  </div>

  <!-- Main Content -->
  <div class="container my-4">
    <h1 class="text-center mb-4">ข้อมูลนายทหารนักเรียน</h1>
    <h4 class="text-center mb-4">หลักสูตรนายทหารสัญญาบัตรใหม่ บก.ทท.</h4>


    <!-- Search Toggle Button -->
    <img id="toggleSearch" src="search_button.png" alt="Search Button" />

    <!-- Search Section -->
    <div id="searchSection" class="row mb-4">
      <!-- รุ่น Dropdown -->
      <div class="col-md-2 mb-2">
        <select id="searchรุ่น" class="form-control">
          <option value="" disabled selected>รุ่น</option>
        </select>
      </div>

      <!-- ชื่อ/สกุล/ชื่อเล่น Input -->
      <div class="col-md-6 mb-2">
        <input id="searchชื่อ" class="form-control" type="text" placeholder="ชื่อ หรือ สกุล หรือ ชื่อเล่น">
      </div>

      <!-- ตำแหน่ง Input -->
      <div class="col-md-2 mb-2">
        <input id="searchตำแหน่ง" class="form-control" type="text" placeholder="สังกัด">
      </div>

      <!-- Buttons -->
      <div class="col-md-2 mb-2 d-flex justify-content-between">
        <button id="searchButton" class="btn btn-primary flex-grow-1 mx-1">ค้นหา</button>
        <button id="resetButton" class="btn btn-secondary flex-grow-1 mx-1">Reset</button>
      </div>
    </div>

    <!-- Cards Container -->
    <div id="cardsContainer" class="row"></div>
  </div>

  <!-- Back to Top Button -->
  <img id="backToTop" src="back_top.png" alt="Back to Top" />

  <!-- JavaScript -->
  <script>
    // Populate the "รุ่น" Dropdown
    const dropdown = document.getElementById("searchรุ่น");
    for (let i = 1; i <= 100; i++) {
      const option = document.createElement("option");
      option.value = i;
      option.textContent = i;
      dropdown.appendChild(option);
    }

    // Fetch Data from Server
    const fetchData = async () => {
      try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbySpE8efPMXAi0d_LVFtCWxinJHNGB0hsjr85W6HK0RN1jNtmSX5FQVKnZbPeq36JN2/exec');
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
      } catch (error) {
        console.error("Error fetching data:", error);
        throw error;
      }
    };

    // Create Card Template
    const createCard = (entry) => `
      <div class="card">
        <img src="${entry['รูปถ่าย'] || 'default.jpg'}" alt="Profile of ${entry['ชื่อ']}">
        <div class="card-body">
          <p><strong>รุ่นที่:</strong> ${entry['รุ่นที่']} <strong>ปี:</strong> ${entry['ปีงบประมาณ']}</p>
          <p><strong>ชื่อ:</strong> ${entry['ยศ']} ${entry['ชื่อ']} ${entry['สกุล']}<br>
             <strong>ชื่อเล่น:</strong> ${entry['ชื่อเล่น']}<br>
             <strong>โทร:</strong> <a href="tel:${entry['หมายเลขโทรศัพท์']}">${entry['หมายเลขโทรศัพท์']}</a><br>
             <strong>สังกัด:</strong> ${entry['ตำแหน่ง']}</p>
        </div>
      </div>`;

    // Render Cards
    const renderCards = (data) => {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = data.map(createCard).join('');
    };

    // Search Cards
    const searchCards = () => {
      const รุ่น = document.getElementById('searchรุ่น').value.toLowerCase();
      const ชื่อ = document.getElementById('searchชื่อ').value.toLowerCase();
      const ตำแหน่ง = document.getElementById('searchตำแหน่ง').value.toLowerCase();

      const filteredData = allData.filter(entry => 
        (!รุ่น || entry['รุ่นที่'].toLowerCase().includes(รุ่น)) &&
        (!ตำแหน่ง || entry['ตำแหน่ง'].toLowerCase().includes(ตำแหน่ง)) &&
        (!ชื่อ || [entry['ชื่อ'], entry['สกุล'], entry['ชื่อเล่น']].some(name => name.toLowerCase().includes(ชื่อ)))
      );

      renderCards(filteredData);
    };

    // Reset Search Fields
    const resetSearch = () => {
      document.getElementById('searchรุ่น').value = '';
      document.getElementById('searchชื่อ').value = '';
      document.getElementById('searchตำแหน่ง').value = '';
      renderCards(allData);
    };

    // Initialize App
    const initialize = async () => {
      const overlay = document.getElementById('loadingOverlay');
      try {
        allData = await fetchData();
        overlay.style.display = 'none';
        renderCards(allData);
      } catch (error) {
        overlay.style.display = 'none';
        document.getElementById('cardsContainer').innerHTML = `
          <div class="alert alert-danger" role="alert">
            ข้อมูลไม่สามารถโหลดได้ โปรดลองอีกครั้ง.
          </div>`;
      }
    };

    // Toggle Search Section
    document.getElementById('toggleSearch').addEventListener('click', () => {
      document.getElementById('searchSection').classList.add('show');
      document.getElementById('toggleSearch').style.display = 'none';
    });

    // Back to Top Button
    const backToTopButton = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTopButton.style.display = window.scrollY > 200 ? 'block' : 'none';
    });

    backToTopButton.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Event Listeners
    document.getElementById('searchButton').addEventListener('click', searchCards);
    document.getElementById('resetButton').addEventListener('click', resetSearch);

    // Start the App
    initialize();
  </script>


</body>

</html>
